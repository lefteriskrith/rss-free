<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RSS Yo</title>
    <link rel="icon" type="image/svg+xml" href="/assets/rss-yo-logo.svg">
    <link rel="apple-touch-icon" href="/assets/rss-yo-logo.svg">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <img class="brand-mark" src="/assets/rss-yo-logo.svg" alt="RSS Yo logo">
          <div>
            <h1>RSS Yo</h1>
            <p>Personal feeds from RSS and regular sites.</p>
          </div>
        </div>

        <section class="sidebar-panel collapsed" id="add-source-panel">
          <button class="panel-toggle" type="button" aria-expanded="false" aria-controls="add-source-form">Add website or feed</button>
          <div class="panel-body">
            <form id="add-source-form" class="add-form">
              <div class="input-row">
                <input id="source-url" name="url" type="url" placeholder="https://example.com" required>
                <button type="submit">Add</button>
              </div>
              <select id="source-group" aria-label="Choose source group"></select>
            </form>
          </div>
        </section>

        <section class="sidebar-panel collapsed" id="add-group-panel">
          <button class="panel-toggle" type="button" aria-expanded="false" aria-controls="add-group-form">Create group</button>
          <div class="panel-body">
            <form id="add-group-form" class="group-form">
              <div class="input-row">
                <input id="group-name" name="group" type="text" placeholder="Tech, News, Blogs">
                <button type="submit">Create</button>
              </div>
            </form>
          </div>
        </section>

        <div class="source-actions">
          <label class="file-button" for="opml-import">Import OPML</label>
          <input id="opml-import" type="file" accept=".opml,.xml,text/xml">
          <button id="export-opml" type="button">Export OPML</button>
        </div>

        <section>
          <div class="section-heading">
            <h2>Sources</h2>
            <span id="source-count">0</span>
          </div>
          <ul id="sources-list" class="sources-list"></ul>
        </section>
      </aside>

      <main class="main">
        <header class="toolbar">
          <div>
            <h2>Feed</h2>
            <p id="status-text">Add a source to begin.</p>
          </div>
          <div class="toolbar-actions">
            <button id="refresh-all" class="primary-action" type="button">Refresh all</button>
            <button id="theme-toggle" type="button">Dark</button>
            <select id="group-filter" aria-label="Filter by group"></select>
            <div class="filters" role="group" aria-label="Post filter">
              <button class="filter active" data-filter="all" type="button">All</button>
              <button class="filter" data-filter="unread" type="button">Unread</button>
              <button class="filter" data-filter="read" type="button">Read</button>
            </div>
          </div>
        </header>

        <section id="feed-list" class="feed-list"></section>
      </main>
    </div>

    <template id="source-template">
      <li class="source-item">
        <button class="source-select" type="button">
          <span class="source-title-row">
            <strong></strong>
            <em class="source-unread"></em>
          </span>
          <small></small>
          <span></span>
        </button>
        <select class="source-group-select" aria-label="Move source to group"></select>
        <div class="source-buttons">
          <button class="mark-source-read" type="button">Mark read</button>
          <button class="copy-rss" type="button">Copy RSS</button>
          <button class="remove-source" type="button">Remove</button>
        </div>
      </li>
    </template>

    <template id="post-template">
      <article class="post">
        <button class="read-toggle" type="button"></button>
        <a class="post-link" target="_blank" rel="noopener noreferrer">
          <div class="post-meta">
            <span class="source-name"></span>
            <time></time>
          </div>
          <h3></h3>
          <p></p>
        </a>
      </article>
    </template>

    <script src="/app.js" type="module"></script>
  </body>
</html>
